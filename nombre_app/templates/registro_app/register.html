<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e7e34;
        }

        .extra {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .extra a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Crear Cuenta</h2>
    
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuario" required>
        <input type="email" name="email" placeholder="Correo electrónico" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <input type="password" name="confirm_password" placeholder="Confirmar contraseña" required>

        <button type="submit">Registrarse</button>
    </form>

    <div class="extra">
        <p>¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>
    </div>
</div>

</body>
</html>
